<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
        .table { border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-person-badge text-primary me-2"></i>教师列表</h4>
        <a href="/teacher/add" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>新增教师
        </a>
    </div>

    <div class="alert alert-success alert-dismissible fade show" th:if="${param.success}" role="alert">
        操作成功！
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <table class="table table-bordered table-hover bg-white shadow-sm">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>姓名</th>
            <th>职称</th>
            <th>院系</th>
            <th class="text-center" style="width: 160px;">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${teachers}">
            <td th:text="${t.id}"></td>
            <td th:text="${t.name}"></td>
            <td th:text="${t.title}"></td>
            <td th:text="${t.department}"></td>
            <td class="text-center">
                <a th:href="@{/teacher/edit/{id}(id=${t.id})}" class="btn btn-sm btn-outline-primary me-1">
                    <i class="bi bi-pencil"></i> 编辑
                </a>
                <a th:href="@{/teacher/delete/{id}(id=${t.id})}" class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('确定要删除该教师吗？关联的选课记录可能受影响。')">
                    <i class="bi bi-trash"></i> 删除
                </a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(teachers)}">
            <td colspan="5" class="text-center text-muted py-4">暂无数据</td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>

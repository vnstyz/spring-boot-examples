<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${action == 'add' ? '新增教师' : '编辑教师'}">教师表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
    </style>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="bi me-1" th:classappend="${action == 'add' ? 'bi-plus-circle' : 'bi-pencil'}"></i>
                        <span th:text="${action == 'add' ? '新增教师' : '编辑教师'}"></span>
                    </h5>
                </div>
                <div class="card-body">
                    <form th:action="${action == 'add' ? '/teacher' : '/teacher/update'}"
                          th:object="${teacher}" method="post">
                        <input type="hidden" th:field="*{id}" th:if="${action == 'edit'}">

                        <div class="mb-3">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="请输入教师姓名">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">职称 <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{title}"
                                    th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                                <option value="">请选择职称</option>
                                <option value="教授">教授</option>
                                <option value="副教授">副教授</option>
                                <option value="讲师">讲师</option>
                                <option value="助教">助教</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">院系 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{department}"
                                   th:classappend="${#fields.hasErrors('department')} ? 'is-invalid'" placeholder="请输入所属院系">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-1"></i>保存
                            </button>
                            <a href="/teacher" class="btn btn-secondary">
                                <i class="bi bi-x-circle me-1"></i>取消
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园管理系统 - 首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
        .card { transition: transform .2s, box-shadow .2s; border: none; border-radius: 12px; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.1); }
        .card-icon { font-size: 3rem; }
    </style>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container mt-5">
    <h2 class="text-center mb-4 text-muted">功能模块</h2>
    <div class="row g-4 justify-content-center">
        <div class="col-md-4">
            <div class="card text-center p-4">
                <div class="card-body">
                    <i class="bi bi-person-badge card-icon text-primary mb-3 d-block"></i>
                    <h5 class="card-title">教师管理</h5>
                    <p class="card-text text-muted">管理教师信息，包括姓名、职称、院系等</p>
                    <a href="/teacher" class="btn btn-primary mt-2">
                        <i class="bi bi-arrow-right-circle me-1"></i>进入管理
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-4">
                <div class="card-body">
                    <i class="bi bi-people card-icon text-success mb-3 d-block"></i>
                    <h5 class="card-title">学生管理</h5>
                    <p class="card-text text-muted">管理学生信息，包括姓名、性别、专业、入学年份等</p>
                    <a href="/student" class="btn btn-success mt-2">
                        <i class="bi bi-arrow-right-circle me-1"></i>进入管理
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-4">
                <div class="card-body">
                    <i class="bi bi-book card-icon text-warning mb-3 d-block"></i>
                    <h5 class="card-title">选课管理</h5>
                    <p class="card-text text-muted">管理学生选课记录，关联教师、课程与成绩</p>
                    <a href="/course" class="btn btn-warning mt-2">
                        <i class="bi bi-arrow-right-circle me-1"></i>进入管理
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>

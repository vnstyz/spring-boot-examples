<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
    </style>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-people text-success me-2"></i>学生列表</h4>
        <a href="/student/add" class="btn btn-success">
            <i class="bi bi-plus-circle me-1"></i>新增学生
        </a>
    </div>

    <table class="table table-bordered table-hover bg-white shadow-sm">
        <thead class="table-success">
        <tr>
            <th>ID</th>
            <th>姓名</th>
            <th>性别</th>
            <th>专业</th>
            <th>入学年份</th>
            <th class="text-center" style="width: 160px;">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${students}">
            <td th:text="${s.id}"></td>
            <td th:text="${s.name}"></td>
            <td th:text="${s.gender}"></td>
            <td th:text="${s.major}"></td>
            <td th:text="${s.enrollmentYear}"></td>
            <td class="text-center">
                <a th:href="@{/student/edit/{id}(id=${s.id})}" class="btn btn-sm btn-outline-success me-1">
                    <i class="bi bi-pencil"></i> 编辑
                </a>
                <a th:href="@{/student/delete/{id}(id=${s.id})}" class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('确定要删除该学生吗？关联的选课记录可能受影响。')">
                    <i class="bi bi-trash"></i> 删除
                </a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(students)}">
            <td colspan="6" class="text-center text-muted py-4">暂无数据</td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${action == 'add' ? '新增学生' : '编辑学生'}">学生表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
    </style>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">
                        <i class="bi me-1" th:classappend="${action == 'add' ? 'bi-plus-circle' : 'bi-pencil'}"></i>
                        <span th:text="${action == 'add' ? '新增学生' : '编辑学生'}"></span>
                    </h5>
                </div>
                <div class="card-body">
                    <form th:action="${action == 'add' ? '/student' : '/student/update'}"
                          th:object="${student}" method="post">
                        <input type="hidden" th:field="*{id}" th:if="${action == 'edit'}">

                        <div class="mb-3">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="请输入学生姓名">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">性别 <span class="text-danger">*</span></label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" th:field="*{gender}" value="男" id="genderM">
                                    <label class="form-check-label" for="genderM">男</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" th:field="*{gender}" value="女" id="genderF">
                                    <label class="form-check-label" for="genderF">女</label>
                                </div>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">专业 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{major}"
                                   th:classappend="${#fields.hasErrors('major')} ? 'is-invalid'" placeholder="请输入专业名称">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('major')}" th:errors="*{major}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">入学年份 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" th:field="*{enrollmentYear}"
                                   th:classappend="${#fields.hasErrors('enrollmentYear')} ? 'is-invalid'"
                                   placeholder="例如：2024" min="2000" max="2099">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('enrollmentYear')}" th:errors="*{enrollmentYear}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle me-1"></i>保存
                            </button>
                            <a href="/student" class="btn btn-secondary">
                                <i class="bi bi-x-circle me-1"></i>取消
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>

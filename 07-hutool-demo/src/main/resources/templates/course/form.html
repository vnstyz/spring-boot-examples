<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${action == 'add' ? '新增选课' : '编辑选课'}">选课表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
    </style>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">
                        <i class="bi me-1" th:classappend="${action == 'add' ? 'bi-plus-circle' : 'bi-pencil'}"></i>
                        <span th:text="${action == 'add' ? '新增选课' : '编辑选课'}"></span>
                    </h5>
                </div>
                <div class="card-body">
                    <form th:action="${action == 'add' ? '/course' : '/course/update'}"
                          th:object="${course}" method="post">
                        <input type="hidden" th:field="*{id}" th:if="${action == 'edit'}">

                        <div class="mb-3">
                            <label class="form-label">学生 <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{student.id}"
                                    th:classappend="${#fields.hasErrors('student')} ? 'is-invalid'">
                                <option value="">请选择学生</option>
                                <option th:each="s : ${students}" th:value="${s.id}"
                                        th:text="${s.name + ' - ' + s.major}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('student')}" th:errors="*{student}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">教师 <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{teacher.id}"
                                    th:classappend="${#fields.hasErrors('teacher')} ? 'is-invalid'">
                                <option value="">请选择教师</option>
                                <option th:each="t : ${teachers}" th:value="${t.id}"
                                        th:text="${t.name + ' - ' + t.department}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('teacher')}" th:errors="*{teacher}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">课程名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{courseName}"
                                   th:classappend="${#fields.hasErrors('courseName')} ? 'is-invalid'" placeholder="请输入课程名称">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('courseName')}" th:errors="*{courseName}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">学期 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{semester}"
                                   th:classappend="${#fields.hasErrors('semester')} ? 'is-invalid'" placeholder="例如：2024-2025-1">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('semester')}" th:errors="*{semester}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">成绩</label>
                            <input type="number" class="form-control" th:field="*{score}"
                                   placeholder="0-100（留空表示未录入）" min="0" max="100">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-check-circle me-1"></i>保存
                            </button>
                            <a href="/course" class="btn btn-secondary">
                                <i class="bi bi-x-circle me-1"></i>取消
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>

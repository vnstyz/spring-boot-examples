<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
    </style>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-book text-warning me-2"></i>选课列表</h4>
        <a href="/course/add" class="btn btn-warning">
            <i class="bi bi-plus-circle me-1"></i>新增选课
        </a>
    </div>

    <table class="table table-bordered table-hover bg-white shadow-sm">
        <thead class="table-warning">
        <tr>
            <th>ID</th>
            <th>学生姓名</th>
            <th>教师姓名</th>
            <th>课程名称</th>
            <th>学期</th>
            <th>成绩</th>
            <th class="text-center" style="width: 160px;">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${courses}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.student.name}"></td>
            <td th:text="${c.teacher.name}"></td>
            <td th:text="${c.courseName}"></td>
            <td th:text="${c.semester}"></td>
            <td>
                <span th:if="${c.score != null}" th:text="${c.score}"
                      class="badge" th:classappend="${c.score >= 90 ? 'bg-success' : (c.score >= 60 ? 'bg-primary' : 'bg-danger')}"></span>
                <span th:if="${c.score == null}" class="text-muted">未录入</span>
            </td>
            <td class="text-center">
                <a th:href="@{/course/edit/{id}(id=${c.id})}" class="btn btn-sm btn-outline-warning me-1">
                    <i class="bi bi-pencil"></i> 编辑
                </a>
                <a th:href="@{/course/delete/{id}(id=${c.id})}" class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('确定要删除该选课记录吗？')">
                    <i class="bi bi-trash"></i> 删除
                </a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(courses)}">
            <td colspan="7" class="text-center text-muted py-4">暂无数据</td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>

spring:
  application:
    name: hutool-demo-web

  # H2 内存数据库配置
  datasource:
    url: jdbc:h2:mem:school_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true

  # SQL 初始化
  sql:
    init:
      mode: always

  # Thymeleaf 配置
  thymeleaf:
    cache: false
    encoding: UTF-8

server:
  port: 8080

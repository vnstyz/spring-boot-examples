server:
  port: 8084

spring:
  application:
    name: taobao-order-service
  datasource:
    url: jdbc:mysql://localhost:3306/taobao_cloud?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
      database: 3
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# 订单服务远程依赖配置。
taobao:
  remote:
    auth-base-url: http://localhost:8081
    cart-base-url: http://localhost:8083
    product-base-url: http://localhost:8082

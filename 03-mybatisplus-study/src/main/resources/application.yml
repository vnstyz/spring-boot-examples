spring:
  application:
    name: 03-mybatisplus-study
  datasource:
    url: jdbc:mysql://localhost:3306/springboot?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:CHANGE_ME}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: org.example.mybatisplusstudy.model
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.example.mybatisplusstudy.entity: debug
